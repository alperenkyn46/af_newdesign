version: '3.8'

# Sadece PostgreSQL - Local development için
# Kullanım: docker-compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: betvip_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: betvip
      POSTGRES_PASSWORD: betvip123
      POSTGRES_DB: betvip_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betvip -d betvip_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
